kind: PersistentVolumeClaim
apiVersion: v1
metadata:
  name: local-pvc-wp
  namespace: wordpress
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: manual
---

kind: PersistentVolumeClaim
apiVersion: v1
metadata:
  name: local-pvc-mysql
  namespace: wordpress
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: manual
