kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4

nodes:
- role: control-plane
  extraPortMappings:
  - containerPort: 80
    hostPort: 880
    protocol: TCP
  - containerPort: 443
    hostPort: 4443
    protocol: TCP
  - containerPort: 31511
    hostPort: 31511
    protocol: TCP

  kubeadmConfigPatches:
  - |
    kind: InitConfiguration
    nodeRegistration:
      kubeletExtraArgs:
        node-labels: "ingress-ready=true"

- role: worker
- role: worker
