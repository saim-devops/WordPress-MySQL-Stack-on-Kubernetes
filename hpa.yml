kind: HorizontalPodAutoscaler
apiVersion: autoscaling/v2
metadata:
  name: wp-autoscaler
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: wp-deployment
  minReplicas: 1
  maxReplicas: 3
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50

# no HPA on sql as it is database, bind to 1 Gi pv, so we have to make multiple pv's to bind multiple sql instances
