apiVersion: v1
kind: PersistentVolume

metadata:
  name: local-pv-wp

spec:
  capacity:
    storage: 1Gi

  accessModes:
  - ReadWriteOnce

  persistentVolumeReclaimPolicy: Retain

  storageClassName: manual

  hostPath:
    path: /mnt/data/wp
---
apiVersion: v1
kind: PersistentVolume

metadata:
  name: local-pv-mysql

spec:
  capacity:
    storage: 1Gi

  accessModes:
  - ReadWriteOnce

  persistentVolumeReclaimPolicy: Retain

  storageClassName: manual

  hostPath:
    path: /mnt/data/mysql
